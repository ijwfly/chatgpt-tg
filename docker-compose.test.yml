services:
  postgres_test:
    image: postgres:15.3
    volumes:
      - ./migrations/sql:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatgpttg
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

  test_runner:
    build: .
    entrypoint: pytest tests/ -v
    volumes:
      - ./:/usr/src/app/
    environment:
      POSTGRES_HOST: postgres_test
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DATABASE: chatgpttg
    depends_on:
      postgres_test:
        condition: service_healthy
